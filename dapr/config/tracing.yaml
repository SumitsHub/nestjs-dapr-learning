# Global Dapr configuration.
#
# This resource is NOT a component — it is a Configuration.
# It is passed to each app via `--config tracing` (or dapr.yaml `configFilePath`).
#
# When enabled, every sidecar attaches W3C traceparent headers to outbound
# Service Invocation and Pub/Sub calls, and exports spans to Zipkin.
#
# UI: http://localhost:9411

apiVersion: dapr.io/v1alpha1
kind: Configuration
metadata:
  name: tracing
spec:
  tracing:
    samplingRate: "1"           # 1 = trace 100% of requests. Lower in prod (e.g. "0.1").
    stdout: false               # set to true to also print span data in sidecar logs
    zipkin:
      endpointAddress: "http://localhost:9411/api/v2/spans"
