services:
  rabbitmq:
    image: rabbitmq:4-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin

  mongodb:
    image: mongo:8
    container_name: mongodb
    ports:
      - "27017:27017"

  zipkin:
    image: openzipkin/zipkin:latest
    container_name: zipkin
    ports:
      - "9411:9411"

  # NOTE — Redis is NOT declared here on purpose.
  #
  # `dapr init` already creates a shared container called `dapr_redis`
  # on port 6379, and every component in this project points at
  # `localhost:6379`. Per-app-ID key prefixing (`<appId>||<key>`) means
  # multiple Dapr projects can safely share that instance.
  #
  # If you want a project-owned Redis instead (e.g. you plan to run
  # `dapr uninstall`, or you need isolated data), add the block below
  # and update `redisHost` in these components to `localhost:6380`:
  #   - dapr/components/orderstore.yaml
  #   - dapr/components/dedupstore.yaml
  #
  # redis:
  #   image: redis:7-alpine
  #   container_name: dapr-learning-redis
  #   ports:
  #     - "6380:6379"