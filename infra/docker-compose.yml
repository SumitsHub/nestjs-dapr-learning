services:
  rabbitmq:
    image: rabbitmq:4-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin

  mongodb:
    image: mongo:8
    container_name: mongodb
    ports:
      - "27017:27017"

  zipkin:
    image: openzipkin/zipkin:latest
    container_name: zipkin
    ports:
      - "9411:9411"

  # Used by order-service's state store to enable the Dapr Outbox
  # pattern (Lesson 15). Redis supports transactions natively, which
  # is a prerequisite for outbox. MongoDB would work too but requires
  # replica-set init — see docs/15-transactional-outbox.md.
  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"